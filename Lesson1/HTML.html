<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML</title>

    <style>
        .a{
            font-size: 20px;
            color: rgb(0,113,133);
            transition: color 0.3s;
        }
        .a:hover{
            color:rgb(199,81,31);
        }

        .b{
            font-weight: bold;
        }

        .c{
            font-weight: bold;
            font-size: 20px;
            color: rgb(0,118,0);
            
        }

        .d{
            background-color: rgb(255,216,20);
            border: none;
            padding: 9px 30px;
            border-radius: 25px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .d:hover{
            background-color: rgb(245, 205,3);
        }

        .e{
            background-color: rgb(255,164,28);
            border: none;
            padding: 9px 30px;
            border-radius: 25px;
            font-size: 16px;
            margin-left: 8px;
            transition: background-color 0.3s;
        }
        .e:hover{
            background-color: rgb(250,137,0);
        }




    </style>


</head>
<body>
    <button>Click </button>
    <button>Navya Verma </button>
    <button>Burger</button>
    <p>Hello, World!</p>
    <p>Today I went to the grocery store to buy some eggs and vegetables.</p>
    <a href="https://www.google.com" target="_blank">Search with Google</a>


    <p>-----------------------------------------------------</p>



    <a href="https://www.amazon.com" target="_blank"  class="a">Back to Amazon</a>
    <h2 class="b">Nike Black Running Shoes </h2>
    <p class="c">$39 - in stock</p>
    <p>Free Delivery tomorrow.</p>

    <button class="d">Add to Cart</button>
    <button class="e">Buy now</button>

</body>
</html>
