<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>

    <style>
        .request {
            background-color: black;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .request:hover{
           opacity: 0.7;
        }

        

        .add-to-cart{
            background-color: rgb(255, 216, 20);
            font-size: 16px;
            width: 150px;
            height: 32px;
            border: none;
            border-radius: 16px;
            margin-left: 100px;
            cursor: pointer;
            transition: background-color 0.3s;

        }
        .add-to-cart:hover{
            background-color: rgb(245, 205, 3)
        }

        .sign-up{
            background-color: rgb(46,164, 79);
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            margin-left: 100px;
            cursor: pointer;
            transition: box-shadow 0.3s;
        }
        .sign-up:hover{
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }


        .get-started{
            background-color: rgb(121,82, 179);
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            margin-left: 100px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .get-started:hover{
            background-color: rgb(99, 60, 156);
        }

        .downlode{
            background-color: white;
            color: rgb(108,117,125);
            font-weight: bold;
            border: 1px solid rgb(108,117,125);
            padding: 12px 20px;
            border-radius: 5px;
            margin-left: 8px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;

        }
        .downlode:hover{
            background-color: rgb(108, 117,125);
            color: white;
        }




        .apply-on-company-website{
            background-color: rgb(10,102, 194);
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            margin-left: 100px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .apply-on-company-website:hover{
            background-color: rgb(8, 85, 160);
        }

        .save{
            background-color: white;
            color: rgb(10,102,194);
            font-weight: bold;
            border: 1px solid rgb(10,102,194);
            padding: 12px 20px;
            border-radius: 25px;
            margin-left: 8px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s ;

        }
        .save:hover{
            background-color: rgb(10, 102, 194);
            color: white;
        }




    </style>






</head>
<body>
    <button class="request">Request now</button>
    <button class="add-to-cart">Add to Cart</button>
    <button class="sign-up">Sign up</button>
    <button class="get-started">Get started</button>
    <button class="downlode">Downlode</button>
    <button class="apply-on-company-website">Apply on company website</button>
    <button class="save">Save</button>





</body>
</html>
