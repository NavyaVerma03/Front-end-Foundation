<!-- Paragraph +2 buttons in same Line -->
 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            border: 1px solid #ccc;
            padding: 15px;
            width: 400px;
        }

        p, button{
            display: inline-block;
            vertical-align: middle;

        }

        p{
            width: 250px;

        }

        button{
            margin-left: 10px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Thanks for chatting with our support. Take survey?</p>
        <button>Yes</button>
        <button>No</button>
    </div>
</body>
</html>
