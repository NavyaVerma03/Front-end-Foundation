<!-- Sign Up Form -->
 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
    body {
        font-family: Arial;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .form {
        background: #fff;
        padding: 20px;
        width: 300px;
        border-radius: 8px;
    }

    .row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
    }

    .row input {
        width: 50%;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
       box-sizing: border-box;
        margin-bottom: 12px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #3b6edc;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
    }
    </style>
</head>

<body>

    <div class="form">
        <div class="row">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Last name">
        </div>

     <input type="email" placeholder="Email">

     <button>Sign Up</button>
    </div>

</body>
</html>
